# Backstage catalog entries for the AuthenticationService repo.
#
# This single file declares everything Backstage needs to:
#   - List the auth API, two libraries, and example consumer as Components
#   - Group them under a System ("authentication")
#   - Surface the docs at docs/ via TechDocs (the techdocs-ref annotation)
#   - Show the OpenAPI spec on the API Component's Definition tab
#   - Track GitHub Actions CI status on the API Component
#
# Register this repo in Backstage via:
#   Backstage UI → + Create → Register Existing Component → paste the URL of this file:
#     https://github.com/Skuzzle-UK/AuthenticationService/blob/main/catalog-info.yaml
#
# Backstage's GitHub integration will then re-import on every push to main.
#
# YAML stream: multiple documents (--- separators), one per entity.
# Order doesn't matter for ingestion — Backstage resolves refs across all entities in the stream.

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: authentication
  title: Authentication & Access
  description: >-
    Centralised identity & access. Issues user JWTs (with refresh rotation + reuse
    detection) and service-identity JWTs (OAuth 2.0 client credentials). Exposes a
    JWKS endpoint so consumers validate locally with no shared secrets.
  tags:
    - identity
    - auth
    - oauth2
    - oidc
    - jwt
spec:
  owner: group:default/platform-team

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: authentication-service
  title: AuthenticationService
  description: >-
    The HTTP API. Registration, login, MFA, refresh rotation, per-device & all-device
    logout, password reset, JWKS + OIDC discovery, /oauth/token for service-to-service.
  annotations:
    # TechDocs reads docs/ from the same directory as this catalog-info.yaml file.
    # `dir:.` resolves relative to the entity's LOCATION (where catalog-info.yaml was
    # loaded from). Two modes:
    #   - Local Backstage: loaded from file:/repo/catalog-info.yaml -> docs at /repo/docs/
    #   - Production Backstage: loaded from url:https://github.com/.../catalog-info.yaml
    #     -> docs cloned from the github repo
    # Deliberately NOT setting backstage.io/source-location -- when omitted, Backstage
    # falls back to the entity's location URL, which dual-modes correctly. Setting it
    # to a github URL would force local Backstage to call GitHub's API (which requires
    # auth and 404s for unauthenticated requests).
    backstage.io/techdocs-ref: dir:.
    # github.com/project-slug surfaces CI status on the Component's overview. The
    # widget shows "no data" in local Backstage (no PAT configured) but works in
    # any Backstage with a GitHub integration.
    github.com/project-slug: Skuzzle-UK/AuthenticationService
    # If you stand up Sentry / Datadog / etc., add their annotations here.
  tags:
    - dotnet
    - aspnetcore
    - api
  links:
    - url: https://github.com/Skuzzle-UK/AuthenticationService
      title: GitHub repository
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/platform-team
  system: authentication
  # The API spec the service serves at /.well-known/openid-configuration plus its
  # Swagger doc. Backstage lists provided APIs on the Component's overview.
  providesApis:
    - authentication-service-rest
    - authentication-service-oidc

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: authentication-service-tokenvalidationlib
  title: AuthenticationService.TokenValidationLib
  description: >-
    Consumer NuGet for validating incoming JWTs issued by AuthenticationService.
    Provides AddAuthenticationServiceJwt + AddScopePolicy. Brings
    AuthenticationService.Shared in transitively.
  annotations:
    backstage.io/techdocs-ref: dir:.
    github.com/project-slug: Skuzzle-UK/AuthenticationService
  tags:
    - dotnet
    - library
    - nuget
spec:
  type: library
  lifecycle: production
  owner: group:default/platform-team
  system: authentication

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: authentication-service-tokenclientlib
  title: AuthenticationService.TokenClientLib
  description: >-
    Consumer NuGet for outgoing service-to-service calls. Acquires service-identity
    tokens via OAuth client credentials, caches them, retries on stale-token 401s,
    and stamps Authorization: Bearer on outgoing HttpClient calls.
    AddAuthenticationServiceTokenClient + AddServiceToken("aud", scopes).
  annotations:
    backstage.io/techdocs-ref: dir:.
    github.com/project-slug: Skuzzle-UK/AuthenticationService
  tags:
    - dotnet
    - library
    - nuget
spec:
  type: library
  lifecycle: production
  owner: group:default/platform-team
  system: authentication

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: example-consumer
  title: ExampleConsumer
  description: >-
    Reference consumer microservice. Demonstrates the end-to-end token validation +
    service-to-service flow against AuthenticationService. Useful as a copy-paste
    starting point when wiring up a new microservice.
  annotations:
    backstage.io/techdocs-ref: dir:.
    github.com/project-slug: Skuzzle-UK/AuthenticationService
  tags:
    - dotnet
    - example
spec:
  type: service
  lifecycle: experimental
  owner: group:default/platform-team
  system: authentication
  consumesApis:
    - authentication-service-rest
    - authentication-service-oidc

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: authentication-service-rest
  title: AuthenticationService REST API
  description: >-
    Registration / login / MFA / refresh / logout / password reset / account self-service
    plus the admin surface (users, clients, audit). OpenAPI spec is served by Swashbuckle
    at /swagger/v1/swagger.json.
spec:
  type: openapi
  lifecycle: production
  owner: group:default/platform-team
  system: authentication
  # `definition` is the real OpenAPI 3 spec emitted by Swashbuckle, inlined
  # below between the marker lines. Regenerated on every push to main by
  # .github/workflows/regen-openapi.yml (or manually via
  # scripts/regen-openapi.{ps1,sh}). The same content is also written to
  # docs/api/openapi.json so it can be viewed / linked / fed into other
  # tooling directly -- this inline copy is what Backstage reads.
  #
  # Why inline rather than $text-reference? Backstage's PlaceholderProcessor
  # calls Node's `new URL(relativePath, entityLocation)` to resolve $text
  # paths. When the entity's location is `file:/repo/catalog-info.yaml`,
  # the URL constructor throws "Invalid URL" -- Backstage's URL Reader
  # has no built-in file:// integration. Inlining sidesteps URL resolution
  # entirely.
  # >>> openapi-injection-begin (do not edit between markers; regen-openapi.ps1 owns this block)
  definition: |
    {
      "openapi": "3.0.4",
      "info": {
        "title": "Authentication API",
        "version": "v1"
      },
      "paths": {
        "/api/Account/me": {
          "get": {
            "tags": [
              "Account"
            ],
            "summary": "Returns the current snapshot of the logged-in user's profile + roles. Useful for\r\nSPAs that want to render user info without parsing the JWT, and for developers\r\ndebugging \"is my token still valid?\" — a 200 here means the token is signed,\r\nunexpired, not revoked, and the user behind it still exists.",
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          },
          "put": {
            "tags": [
              "Account"
            ],
            "summary": "Updates editable profile fields on the logged-in user. Each field on the body is\r\noptional — only the supplied ones are written, the rest are left untouched. Returns\r\n200 with an empty AuthenticationService.Shared.Dtos.Response.ApiResponse on success; clients should re-fetch\r\n`GET /me` if they need the post-update snapshot.\r\n            \r\n\r\nChanging `PhoneNumber` resets the phone-confirmed flag — the user must\r\nre-confirm before SMS-based MFA will work against the new number. Username, email,\r\npassword, MFA, and roles are out of scope here — they each have a dedicated flow.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/UpdateProfileDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/UpdateProfileDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/UpdateProfileDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Account/enablemfa": {
          "get": {
            "tags": [
              "Account"
            ],
            "summary": "Starts MFA enrolment for the logged-in user. Returns the shared secret and a QR code\r\nthe user can scan into an authenticator app, or the verification details for the\r\nchosen non-app provider (e.g. email).",
            "requestBody": {
              "description": "EnableMfaRequest",
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/EnableMfaRequest"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/EnableMfaRequest"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/EnableMfaRequest"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Account/forgotpassword": {
          "post": {
            "tags": [
              "Account"
            ],
            "summary": "Kicks off the \"I forgot my password\" flow. Sends an email with a single-use reset\r\nlink. Returns 200 even when the email isn't recognised — we don't leak which\r\naddresses are registered.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ForgotPasswordDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ForgotPasswordDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/ForgotPasswordDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Account/forgotpassword/reset": {
          "post": {
            "tags": [
              "Account"
            ],
            "summary": "Sets a new password using the single-use token from a forgot-password email. Also\r\nclears any active lockout — this endpoint doubles as the account-recovery path.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ResetForgottenPasswordDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ResetForgottenPasswordDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/ResetForgottenPasswordDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Account/changepassword": {
          "post": {
            "tags": [
              "Account"
            ],
            "summary": "Changes the logged-in user's password. The user is identified from the token's\r\n`sub` claim — a user can never change anyone else's password through here, even\r\nif they pass a different email in the request body.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ChangePasswordDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ChangePasswordDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/ChangePasswordDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Account/lock": {
          "post": {
            "tags": [
              "Account"
            ],
            "summary": "\"Wasn't me!\" — the link in the password-changed email lands here. Locks the account\r\nand sends the real owner a password-reset email so they can recover it.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/LockAccountDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/LockAccountDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/LockAccountDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users": {
          "get": {
            "tags": [
              "Admin"
            ],
            "summary": "Paginated list of users with optional filters (search, locked-only, unconfirmed-only).",
            "parameters": [
              {
                "name": "page",
                "in": "query",
                "schema": {
                  "type": "integer",
                  "format": "int32",
                  "default": 1
                }
              },
              {
                "name": "pageSize",
                "in": "query",
                "schema": {
                  "type": "integer",
                  "format": "int32",
                  "default": 20
                }
              },
              {
                "name": "search",
                "in": "query",
                "schema": {
                  "type": "string"
                }
              },
              {
                "name": "lockedOnly",
                "in": "query",
                "schema": {
                  "type": "boolean",
                  "default": false
                }
              },
              {
                "name": "unconfirmedOnly",
                "in": "query",
                "schema": {
                  "type": "boolean",
                  "default": false
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          },
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Creates a new user via the invitation flow. The user gets an email with a link to\r\nset their initial password; the account is unusable until they do.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminCreateUserDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminCreateUserDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminCreateUserDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}": {
          "get": {
            "tags": [
              "Admin"
            ],
            "summary": "Full detail for a single user — profile, lockout state, MFA, roles, active session count.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}/resend-invitation": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Re-sends the invitation email for a user still in the pending-invitation state.\r\nReturns 409 if the user has already accepted (or otherwise activated their account).",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}/lock": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Locks a user account indefinitely. Refuses self-target.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}/unlock": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Lifts an active lockout and resets the failed-attempt counter.\r\nRefuses self-target (admins use the seed-account recovery path, not this endpoint).",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}/revoke-sessions": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Revokes every active session the user has — refresh-token families + rotates the security\r\nstamp. The \"log them out everywhere\" hammer. Doesn't lock the account; user can sign back in.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}/reset-mfa": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Disables the user's MFA and clears their authenticator key. Used by helpdesk for lost-phone\r\nrecovery. Revokes all sessions implicitly.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}/force-password-reset": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Force-password-reset — generates an Identity reset token, emails it to the user, and\r\nrevokes the user's existing sessions. Admin never sees the new password (user picks it\r\nthemselves via the reset-password page).",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ForcePasswordResetRequest"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ForcePasswordResetRequest"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/ForcePasswordResetRequest"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}/audit": {
          "get": {
            "tags": [
              "Admin"
            ],
            "summary": "Paginated audit log for the user — reads from the `SecurityEvents` table\r\npopulated by the custom Serilog sink. Defaults to the last 30 days of events;\r\npasses AuthenticationService.Services.AdminAuditFilter through to the service.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              },
              {
                "name": "page",
                "in": "query",
                "schema": {
                  "type": "integer",
                  "format": "int32",
                  "default": 1
                }
              },
              {
                "name": "pageSize",
                "in": "query",
                "schema": {
                  "type": "integer",
                  "format": "int32",
                  "default": 50
                }
              },
              {
                "name": "since",
                "in": "query",
                "schema": {
                  "type": "string",
                  "format": "date-time"
                }
              },
              {
                "name": "eventId",
                "in": "query",
                "schema": {
                  "type": "integer",
                  "format": "int32"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/clients": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Creates a new OAuth client. The plaintext secret is generated server-side and\r\nreturned <em>once</em> in the response — admins must capture it now; only the\r\nhash is persisted.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminCreateClientDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminCreateClientDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminCreateClientDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          },
          "get": {
            "tags": [
              "Admin"
            ],
            "summary": "Paginated list of clients with optional `activeOnly` filter.",
            "parameters": [
              {
                "name": "page",
                "in": "query",
                "schema": {
                  "type": "integer",
                  "format": "int32",
                  "default": 1
                }
              },
              {
                "name": "pageSize",
                "in": "query",
                "schema": {
                  "type": "integer",
                  "format": "int32",
                  "default": 20
                }
              },
              {
                "name": "activeOnly",
                "in": "query",
                "schema": {
                  "type": "boolean",
                  "default": false
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/clients/{id}": {
          "get": {
            "tags": [
              "Admin"
            ],
            "summary": "Full detail for a single client — metadata + scopes list. Never includes the secret hash.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/clients/{id}/rotate-secret": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Generates a fresh secret and overwrites the stored hash. Response carries the\r\nnew plaintext secret — same one-time-display contract as create.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/clients/{id}/disable": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Soft-disable the client. Subsequent `/oauth/token` attempts return\r\n`invalid_client`; the row stays for audit and can be re-enabled out-of-band.\r\nIdempotent — disabling an already-disabled client returns 200 with no further effect.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/clients/{id}/scopes": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Add a (audience, scope) tuple to a client. Idempotent — adding a duplicate is a\r\nno-op success.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminClientScopeDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminClientScopeDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminClientScopeDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/clients/{id}/scopes/{audience}/{scope}": {
          "delete": {
            "tags": [
              "Admin"
            ],
            "summary": "Remove a (audience, scope) tuple from a client. Returns 404 if the tuple wasn't present.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              },
              {
                "name": "audience",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              },
              {
                "name": "scope",
                "in": "path",
                "required": true,
                "schema": {
