# Backstage catalog entries for the AuthenticationService repo.
#
# This single file declares everything Backstage needs to:
#   - List the auth API, two libraries, and example consumer as Components
#   - Group them under a System ("authentication")
#   - Surface the docs at docs/ via TechDocs (the techdocs-ref annotation)
#   - Show the OpenAPI spec on the API Component's Definition tab
#   - Track GitHub Actions CI status on the API Component
#
# Register this repo in Backstage via:
#   Backstage UI → + Create → Register Existing Component → paste the URL of this file:
#     https://github.com/Skuzzle-UK/AuthenticationService/blob/main/catalog-info.yaml
#
# Backstage's GitHub integration will then re-import on every push to main.
#
# YAML stream: multiple documents (--- separators), one per entity.
# Order doesn't matter for ingestion — Backstage resolves refs across all entities in the stream.

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: authentication
  title: Authentication & Access
  description: >-
    Centralised identity & access. Issues user JWTs (with refresh rotation + reuse
    detection) and service-identity JWTs (OAuth 2.0 client credentials). Exposes a
    JWKS endpoint so consumers validate locally with no shared secrets.
  tags:
    - identity
    - auth
    - oauth2
    - oidc
    - jwt
spec:
  owner: group:default/platform-team

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: authentication-service
  title: AuthenticationService
  description: >-
    The HTTP API. Registration, login, MFA, refresh rotation, per-device & all-device
    logout, password reset, JWKS + OIDC discovery, /oauth/token for service-to-service.
  annotations:
    # TechDocs reads docs/ from the same directory as this catalog-info.yaml file.
    # `dir:.` resolves relative to the entity's LOCATION (where catalog-info.yaml was
    # loaded from). Two modes:
    #   - Local Backstage: loaded from file:/repo/catalog-info.yaml -> docs at /repo/docs/
    #   - Production Backstage: loaded from url:https://github.com/.../catalog-info.yaml
    #     -> docs cloned from the github repo
    # Deliberately NOT setting backstage.io/source-location -- when omitted, Backstage
    # falls back to the entity's location URL, which dual-modes correctly. Setting it
    # to a github URL would force local Backstage to call GitHub's API (which requires
    # auth and 404s for unauthenticated requests).
    backstage.io/techdocs-ref: dir:.
    # github.com/project-slug surfaces CI status on the Component's overview. The
    # widget shows "no data" in local Backstage (no PAT configured) but works in
    # any Backstage with a GitHub integration.
    github.com/project-slug: Skuzzle-UK/AuthenticationService
    # If you stand up Sentry / Datadog / etc., add their annotations here.
  tags:
    - dotnet
    - aspnetcore
    - api
  links:
    - url: https://github.com/Skuzzle-UK/AuthenticationService
      title: GitHub repository
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/platform-team
  system: authentication
  # The API spec the service serves at /.well-known/openid-configuration plus its
  # Swagger doc. Backstage lists provided APIs on the Component's overview.
  providesApis:
    - authentication-service-rest
    - authentication-service-oidc

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: authentication-service-tokenvalidationlib
  title: AuthenticationService.TokenValidationLib
  description: >-
    Consumer NuGet for validating incoming JWTs issued by AuthenticationService.
    Provides AddAuthenticationServiceJwt + AddScopePolicy. Brings
    AuthenticationService.Shared in transitively.
  annotations:
    backstage.io/techdocs-ref: dir:.
    github.com/project-slug: Skuzzle-UK/AuthenticationService
  tags:
    - dotnet
    - library
    - nuget
spec:
  type: library
  lifecycle: production
  owner: group:default/platform-team
  system: authentication

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: authentication-service-tokenclientlib
  title: AuthenticationService.TokenClientLib
  description: >-
    Consumer NuGet for outgoing service-to-service calls. Acquires service-identity
    tokens via OAuth client credentials, caches them, retries on stale-token 401s,
    and stamps Authorization: Bearer on outgoing HttpClient calls.
    AddAuthenticationServiceTokenClient + AddServiceToken("aud", scopes).
  annotations:
    backstage.io/techdocs-ref: dir:.
    github.com/project-slug: Skuzzle-UK/AuthenticationService
  tags:
    - dotnet
    - library
    - nuget
spec:
  type: library
  lifecycle: production
  owner: group:default/platform-team
  system: authentication

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: example-consumer
  title: ExampleConsumer
  description: >-
    Reference consumer microservice. Demonstrates the end-to-end token validation +
    service-to-service flow against AuthenticationService. Useful as a copy-paste
    starting point when wiring up a new microservice.
  annotations:
    backstage.io/techdocs-ref: dir:.
    github.com/project-slug: Skuzzle-UK/AuthenticationService
  tags:
    - dotnet
    - example
spec:
  type: service
  lifecycle: experimental
  owner: group:default/platform-team
  system: authentication
  consumesApis:
    - authentication-service-rest
    - authentication-service-oidc

---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: authentication-service-rest
  title: AuthenticationService REST API
  description: >-
    Registration / login / MFA / refresh / logout / password reset / account self-service
    plus the admin surface (users, clients, audit). OpenAPI spec is served by Swashbuckle
    at /swagger/v1/swagger.json.
spec:
  type: openapi
  lifecycle: production
  owner: group:default/platform-team
  system: authentication
  # `definition` is the real OpenAPI 3 spec emitted by Swashbuckle, inlined
  # below between the marker lines. Regenerated on every push to main by
  # .github/workflows/regen-openapi.yml (or manually via
  # scripts/regen-openapi.{ps1,sh}). The same content is also written to
  # docs/api/openapi.json so it can be viewed / linked / fed into other
  # tooling directly -- this inline copy is what Backstage reads.
  #
  # Why inline rather than $text-reference? Backstage's PlaceholderProcessor
  # calls Node's `new URL(relativePath, entityLocation)` to resolve $text
  # paths. When the entity's location is `file:/repo/catalog-info.yaml`,
  # the URL constructor throws "Invalid URL" -- Backstage's URL Reader
  # has no built-in file:// integration. Inlining sidesteps URL resolution
  # entirely.
  # >>> openapi-injection-begin (do not edit between markers; regen-openapi.ps1 owns this block)
  definition: |
    {
      "openapi": "3.0.4",
      "info": {
        "title": "Authentication API",
        "version": "v1"
      },
      "paths": {
        "/api/Account/me": {
          "get": {
            "tags": [
              "Account"
            ],
            "summary": "Returns the logged-in user's profile + roles. A 200 means the token is valid and the user still exists.",
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          },
          "put": {
            "tags": [
              "Account"
            ],
            "summary": "Updates editable profile fields on the logged-in user. Body fields are optional; only supplied ones are written. Changing PhoneNumber resets the phone-confirmed flag.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/UpdateProfileDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/UpdateProfileDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/UpdateProfileDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Account/enablemfa": {
          "get": {
            "tags": [
              "Account"
            ],
            "summary": "Starts MFA enrolment. Returns a shared secret + QR code for authenticator apps, or verification details for email/phone providers.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/EnableMfaRequest"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/EnableMfaRequest"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/EnableMfaRequest"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Account/forgotpassword": {
          "post": {
            "tags": [
              "Account"
            ],
            "summary": "Starts the forgot-password flow. Returns 200 even for unknown emails — don't leak which addresses are registered.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ForgotPasswordDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ForgotPasswordDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/ForgotPasswordDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Account/forgotpassword/reset": {
          "post": {
            "tags": [
              "Account"
            ],
            "summary": "Sets a new password using the forgot-password email token. Also clears active lockouts — doubles as account-recovery.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ResetForgottenPasswordDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ResetForgottenPasswordDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/ResetForgottenPasswordDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Account/changepassword": {
          "post": {
            "tags": [
              "Account"
            ],
            "summary": "Changes the logged-in user's password. User is identified from the token's sub claim — body email is ignored for identity.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ChangePasswordDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ChangePasswordDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/ChangePasswordDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Account/lock": {
          "post": {
            "tags": [
              "Account"
            ],
            "summary": ""Wasn't me!" — landing point for the password-changed email link. Locks the account and emails the owner a reset link.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/LockAccountDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/LockAccountDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/LockAccountDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users": {
          "get": {
            "tags": [
              "Admin"
            ],
            "summary": "Paginated list of users with optional filters (search, locked-only, unconfirmed-only).",
            "parameters": [
              {
                "name": "page",
                "in": "query",
                "schema": {
                  "type": "integer",
                  "format": "int32",
                  "default": 1
                }
              },
              {
                "name": "pageSize",
                "in": "query",
                "schema": {
                  "type": "integer",
                  "format": "int32",
                  "default": 20
                }
              },
              {
                "name": "search",
                "in": "query",
                "schema": {
                  "type": "string"
                }
              },
              {
                "name": "lockedOnly",
                "in": "query",
                "schema": {
                  "type": "boolean",
                  "default": false
                }
              },
              {
                "name": "unconfirmedOnly",
                "in": "query",
                "schema": {
                  "type": "boolean",
                  "default": false
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          },
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Creates a user via the invitation flow. Account is unusable until the user clicks the email link and sets a password.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminCreateUserDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminCreateUserDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminCreateUserDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}": {
          "get": {
            "tags": [
              "Admin"
            ],
            "summary": "Full detail for a single user — profile, lockout, MFA, roles, active session count.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}/resend-invitation": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Re-sends the invitation email. Returns 409 if the user has already activated their account.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}/lock": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Locks a user account indefinitely. Refuses self-target.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}/unlock": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Lifts an active lockout and resets the failed-attempt counter. Refuses self-target (admins use the seed-account recovery path).",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}/revoke-sessions": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Revokes every active session — refresh-token families + rotates security stamp. Doesn't lock the account; user can sign back in.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}/reset-mfa": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Disables MFA and clears the authenticator key — helpdesk lost-phone recovery. Revokes all sessions implicitly.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}/force-password-reset": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Generates a reset token, emails it, and revokes existing sessions. Admin never sees the new password.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ForcePasswordResetRequest"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/ForcePasswordResetRequest"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/ForcePasswordResetRequest"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/users/{id}/audit": {
          "get": {
            "tags": [
              "Admin"
            ],
            "summary": "Paginated audit log for the user. Reads `SecurityEvents`; defaults to the last 30 days.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              },
              {
                "name": "page",
                "in": "query",
                "schema": {
                  "type": "integer",
                  "format": "int32",
                  "default": 1
                }
              },
              {
                "name": "pageSize",
                "in": "query",
                "schema": {
                  "type": "integer",
                  "format": "int32",
                  "default": 50
                }
              },
              {
                "name": "since",
                "in": "query",
                "schema": {
                  "type": "string",
                  "format": "date-time"
                }
              },
              {
                "name": "eventId",
                "in": "query",
                "schema": {
                  "type": "integer",
                  "format": "int32"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/clients": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Creates a new OAuth client. Plaintext secret is returned <em>once</em> in the response — only the hash is persisted.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminCreateClientDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminCreateClientDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminCreateClientDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          },
          "get": {
            "tags": [
              "Admin"
            ],
            "summary": "Paginated list of clients with optional `activeOnly` filter.",
            "parameters": [
              {
                "name": "page",
                "in": "query",
                "schema": {
                  "type": "integer",
                  "format": "int32",
                  "default": 1
                }
              },
              {
                "name": "pageSize",
                "in": "query",
                "schema": {
                  "type": "integer",
                  "format": "int32",
                  "default": 20
                }
              },
              {
                "name": "activeOnly",
                "in": "query",
                "schema": {
                  "type": "boolean",
                  "default": false
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/clients/{id}": {
          "get": {
            "tags": [
              "Admin"
            ],
            "summary": "Full detail for a single client — metadata + scopes list. Never includes the secret hash.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/clients/{id}/rotate-secret": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Generates a fresh secret and overwrites the stored hash. Response carries the new plaintext — same one-time-display contract as create.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/clients/{id}/disable": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Soft-disable the client. Subsequent /oauth/token attempts return invalid_client. Idempotent.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/clients/{id}/scopes": {
          "post": {
            "tags": [
              "Admin"
            ],
            "summary": "Add an (audience, scope) tuple to a client. Idempotent.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminClientScopeDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminClientScopeDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/AdminClientScopeDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Admin/clients/{id}/scopes/{audience}/{scope}": {
          "delete": {
            "tags": [
              "Admin"
            ],
            "summary": "Remove a (audience, scope) tuple from a client. Returns 404 if the tuple wasn't present.",
            "parameters": [
              {
                "name": "id",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              },
              {
                "name": "audience",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              },
              {
                "name": "scope",
                "in": "path",
                "required": true,
                "schema": {
                  "type": "string"
                }
              }
            ],
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Authentication/authenticate": {
          "post": {
            "tags": [
              "Authentication"
            ],
            "summary": "Login. Returns access + refresh tokens on success, or kicks off the MFA challenge if MFA is enabled.",
            "requestBody": {
              "content": {
                "application/json": {
                  "schema": {
                    "$ref": "#/components/schemas/AuthenticationDto"
                  }
                },
                "text/json": {
                  "schema": {
                    "$ref": "#/components/schemas/AuthenticationDto"
                  }
                },
                "application/*+json": {
                  "schema": {
                    "$ref": "#/components/schemas/AuthenticationDto"
                  }
                }
              }
            },
            "responses": {
              "200": {
                "description": "OK"
              }
            }
          }
        },
        "/api/Authentication/mfa": {
