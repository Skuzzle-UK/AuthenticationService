# Backstage catalog entries for the AuthenticationService repo.
#
# This single file declares everything Backstage needs to:
#   - List the auth API, two libraries, and example consumer as Components
#   - Group them under a System ("authentication")
#   - Surface the docs at docs/ via TechDocs (the techdocs-ref annotation)
#   - Show the OpenAPI spec on the API Component's Definition tab
#   - Track GitHub Actions CI status on the API Component
#
# Register this repo in Backstage via:
#   Backstage UI → + Create → Register Existing Component → paste the URL of this file:
#     https://github.com/Skuzzle-UK/AuthenticationService/blob/main/catalog-info.yaml
#
# Backstage's GitHub integration will then re-import on every push to main.
#
# YAML stream: multiple documents (--- separators), one per entity.
# Order doesn't matter for ingestion — Backstage resolves refs across all entities in the stream.

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: authentication
  title: Authentication & Access
  description: >-
    Centralised identity & access. Issues user JWTs (with refresh rotation + reuse
    detection) and service-identity JWTs (OAuth 2.0 client credentials). Exposes a
    JWKS endpoint so consumers validate locally with no shared secrets.
  annotations:
    backstage.io/source-location: url:https://github.com/Skuzzle-UK/AuthenticationService
  tags:
    - identity
    - auth
    - oauth2
    - oidc
    - jwt
spec:
  owner: group:default/platform-team

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: authentication-service
  title: AuthenticationService
  description: >-
    The HTTP API. Registration, login, MFA, refresh rotation, per-device & all-device
    logout, password reset, JWKS + OIDC discovery, /oauth/token for service-to-service.
  annotations:
    # TechDocs reads docs/ from this repo (the repo root is implicit when the annotation
    # is co-located with the source).
    backstage.io/techdocs-ref: dir:.
    backstage.io/source-location: url:https://github.com/Skuzzle-UK/AuthenticationService/tree/main/AuthenticationService
    # Surface CI status on the Component's overview.
    github.com/project-slug: Skuzzle-UK/AuthenticationService
    # If you stand up Sentry / Datadog / etc., add their annotations here.
  tags:
    - dotnet
    - aspnetcore
    - api
  links:
    - url: https://github.com/Skuzzle-UK/AuthenticationService
      title: GitHub repository
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/platform-team
  system: authentication
  # The API spec the service serves at /.well-known/openid-configuration plus its
  # Swagger doc. Backstage lists provided APIs on the Component's overview.
  providesApis:
    - authentication-service-rest
    - authentication-service-oidc

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: authentication-service-tokenvalidationlib
  title: AuthenticationService.TokenValidationLib
  description: >-
    Consumer NuGet for validating incoming JWTs issued by AuthenticationService.
    Provides AddAuthenticationServiceJwt + AddScopePolicy. Brings
    AuthenticationService.Shared in transitively.
  annotations:
    backstage.io/techdocs-ref: dir:.
    backstage.io/source-location: url:https://github.com/Skuzzle-UK/AuthenticationService/tree/main/AuthenticationService.TokenValidationLib
    github.com/project-slug: Skuzzle-UK/AuthenticationService
  tags:
    - dotnet
    - library
    - nuget
spec:
  type: library
  lifecycle: production
  owner: group:default/platform-team
  system: authentication

---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: authentication-service-tokenclientlib
  title: AuthenticationService.TokenClientLib
  description: >-
    Consumer NuGet for outgoing service-to-service calls. Acquires service-identity
    tokens via OAuth client credentials, caches them, retries on stale-token 401s,
    and stamps Authorization: Bearer on outgoing HttpClient calls.
    AddAuthenticationServiceTokenClient + AddServiceToken("aud", scopes).
  annotations:
    backstage.io/techdocs-ref: dir:.
    backstage.io/source-location: url:https://github.com/Skuzzle-UK/AuthenticationService/tree/main/AuthenticationService.TokenClientLib
    github.com/project-slug: Skuzzle-UK/AuthenticationService
  tags:
    - dotnet
    - library
    - nuget
spec:
  type: library
  lifecycle: production
  owner: group:default/platform-team
  system: authentication

