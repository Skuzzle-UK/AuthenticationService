name: CI

# Triggers the workflow on:
#   - Pushes to any branch (so feature-branch work gets fast feedback)
#   - Pull requests targeting any branch (gating merges)
#   - Manual dispatch from the Actions UI (handy for ad-hoc runs)
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs when a newer commit arrives on the same ref. Without this, a
# noisy push-twice-quickly cycle would queue up multiple slow runs that all do the
# same work.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests — fast feedback on every push.
  # All 396 unit tests across Client / Shared / main service. Runs in ~30s
  # including build, no external dependencies needed (substituted services +
  # SQLite in-memory).
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore packages
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: >-
          dotnet test Tests/
          --no-build
          --configuration Release
          --logger "trx;LogFileName=unit-results.trx"
          --results-directory ${{ github.workspace }}/TestResults

      # Always upload — including on failure — so a failing run still leaves the
      # TRX behind for inspection.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: ${{ github.workspace }}/TestResults/**/*.trx

  # ---------------------------------------------------------------------------
  # Integration tests — slower (~60s), runs against real MySQL / Redis / smtp4dev
  # containers spun up by the Aspire AppHost. Skipped on plain feature-branch
  # pushes to keep the fast loop fast; runs on every PR and on push to main.
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration tests (Aspire + Docker)
    runs-on: ubuntu-latest
    needs: unit-tests   # don't burn ~60s of integration tests if a unit test is broken
    if: |
      github.event_name == 'pull_request'
      || (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore packages
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore --configuration Release

      # ubuntu-latest GitHub-hosted runners come with Docker pre-installed and
      # running. Aspire's DCP downloads on first run (~5s) and is cached for the
      # duration of the runner's life — fine for our purposes.
      - name: Run integration tests
        run: >-
          dotnet test AuthenticationService.IntegrationTests/
          --no-build
          --configuration Release
          --logger "trx;LogFileName=integration-results.trx"
          --results-directory ${{ github.workspace }}/TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ${{ github.workspace }}/TestResults/**/*.trx
