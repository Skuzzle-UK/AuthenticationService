name: CI

# Triggers the workflow on:
#   - Pushes to any branch (so feature-branch work gets fast feedback)
#   - Pull requests targeting any branch (gating merges)
#   - Manual dispatch from the Actions UI (handy for ad-hoc runs)
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs when a newer commit arrives on the same ref. Without this, a
# noisy push-twice-quickly cycle would queue up multiple slow runs that all do the
# same work.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 for JavaScript-based actions. Without this, GitHub emits a
# deprecation warning on every step that uses a v4-and-earlier action (checkout,
# setup-dotnet, upload-artifact, etc.). Forced default arrives June 2nd 2026; opting
# in early just makes the warnings go away.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests — fast feedback on every push.
  # All 538 unit tests across the four test projects. No external dependencies
  # (substituted services + SQLite in-memory). Each project is tested explicitly
  # because `dotnet test` against a folder requires exactly one csproj IN that
  # folder — pointing it at the parent `Tests/` directory fails to discover the
  # nested projects.
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore packages
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore --configuration Release

      - name: Run AuthenticationService.TokenValidationLib.Tests
        run: >-
          dotnet test Tests/AuthenticationService.TokenValidationLib.Tests/AuthenticationService.TokenValidationLib.Tests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=token-validation-results.trx"
          --results-directory ${{ github.workspace }}/TestResults

      - name: Run AuthenticationService.TokenClientLib.Tests
        run: >-
          dotnet test Tests/AuthenticationService.TokenClientLib.Tests/AuthenticationService.TokenClientLib.Tests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=token-client-results.trx"
          --results-directory ${{ github.workspace }}/TestResults

      - name: Run AuthenticationService.Shared.Tests
        run: >-
          dotnet test Tests/AuthenticationService.Shared.Tests/AuthenticationService.Shared.Tests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=shared-results.trx"
          --results-directory ${{ github.workspace }}/TestResults

      - name: Run AuthenticationService.Tests
        run: >-
          dotnet test Tests/AuthenticationService.Tests/AuthenticationService.Tests.csproj
          --no-build
          --configuration Release
          --logger "trx;LogFileName=main-results.trx"
          --results-directory ${{ github.workspace }}/TestResults

      # Always upload — including on failure — so a failing run still leaves the
      # TRX behind for inspection.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: ${{ github.workspace }}/TestResults/**/*.trx

  # ---------------------------------------------------------------------------
  # Integration tests — slower (~60s per provider), runs against real DB / Redis /
  # smtp4dev containers spun up by the Aspire AppHost. Matrix fans the suite out
  # across MySQL, SqlServer, and PostgreSQL so every provider is exercised end-to-end.
  # Skipped on plain feature-branch pushes to keep the fast loop fast; runs on every
  # PR and on push to master.
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration tests (${{ matrix.db }})
    runs-on: ubuntu-latest
    needs: unit-tests   # don't burn ~60s of integration tests if a unit test is broken
    if: |
      github.event_name == 'pull_request'
      || (github.event_name == 'push' && github.ref == 'refs/heads/master')
      || github.event_name == 'workflow_dispatch'

    strategy:
      # fail-fast: false so a flake on one provider doesn't cancel the in-flight
      # runs on the other two — we want to see all three results in the PR check
      # summary, not just the first one to die.
      fail-fast: false
      matrix:
        db: [MySQL, SqlServer, PostgreSQL]

    env:
      # AppHostFixture / AppHost.cs read this to pick which DB container to spin.
      INTEGRATION_DB_PROVIDER: ${{ matrix.db }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore packages
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore --configuration Release

      # ubuntu-latest GitHub-hosted runners come with Docker pre-installed and
      # running. Aspire's DCP downloads on first run (~5s) and is cached for the
      # duration of the runner's life — fine for our purposes.
      #
      # We exclude `MultiProviderQuirks` because each matrix shard already gives one
      # provider's worth of coverage of the bulk scenarios — running the in-process
      # 3-provider quirks suite on every shard would spin three extra container sets
      # per job for no extra signal. The quirks suite is for local-dev fast feedback;
      # see development/testing.md.
      - name: Run integration tests
        run: >-
          dotnet test AuthenticationService.IntegrationTests/AuthenticationService.IntegrationTests.csproj
          --no-build
          --configuration Release
          --filter "Category!=MultiProviderQuirks"
          --logger "trx;LogFileName=integration-results-${{ matrix.db }}.trx"
          --results-directory ${{ github.workspace }}/TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.db }}
          path: ${{ github.workspace }}/TestResults/**/*.trx
